services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build:
      context: .
      target: api
    container_name: taskprocessor-api
    ports:
      - "5000:8080"
    environment:
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: TaskProcessorDb
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      - mongodb
      - rabbitmq

  worker:
    build:
      context: .
      target: worker
    container_name: taskprocessor-worker
    environment:
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: TaskProcessorDb
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      - mongodb
      - rabbitmq

volumes:
  mongo-data: